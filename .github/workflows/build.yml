name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qt5-qmake qtbase5-dev qtmultimedia5-dev libqt5svg5-dev

      - name: Install build tools
        run: |
          sudo apt-get install -y g++ make upx

      - name: Build
        run: bash build.sh --appimage $( [[ '${{ github.ref }}' == refs/tags/v* ]] && echo --upx )

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-linux
          path: |
            dist/I2PChat
            dist/I2PChat-*.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: |
          mkdir dist
          qmake I2PChat.pro "CONFIG += release"
          nmake > build.log 2>&1
          set ERR=%ERRORLEVEL%
          type build.log
          exit /b %ERR%

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-windows
          path: |
            dist/I2PChat.exe
            release/I2PChat.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        id: cache-qt5
        with:
          path: /usr/local/Cellar/qt@5
          key: qt5-macos

      - name: Install Qt5
        run: |
          if [ "${{ steps.cache-qt5.outputs.cache-hit }}" = "true" ]; then
            VERSION=$(ls /usr/local/Cellar/qt@5/ | head -1)
            ln -sf /usr/local/Cellar/qt@5/$VERSION /usr/local/opt/qt@5
          else
            brew install qt@5
          fi
          echo "/usr/local/opt/qt@5/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          qmake I2PChat.pro "CONFIG += release" -after DESTDIR=dist/
          make -j$(sysctl -n hw.logicalcpu)
          strip dist/I2PChat.app/Contents/MacOS/I2PChat -o dist/I2PChat 2>/dev/null || \
            cp dist/I2PChat.app/Contents/MacOS/I2PChat dist/I2PChat

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-macos
          path: dist/I2PChat

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          cp I2PChat-linux/I2PChat release-assets/
          cp I2PChat-windows/I2PChat.exe release-assets/
          cp I2PChat-macos/I2PChat release-assets/I2PChat-macos
          ls I2PChat-linux/I2PChat-*.AppImage 2>/dev/null && \
            cp I2PChat-linux/I2PChat-*.AppImage release-assets/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  nightly:
    if: github.ref == 'refs/heads/master'
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Debug artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find . -maxdepth 3 -type f 2>/dev/null || true
          echo "=== End ==="

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          cp I2PChat-linux/I2PChat release-assets/ 2>/dev/null || echo "MISSING I2PChat-linux"
          cp I2PChat-windows/I2PChat.exe release-assets/ 2>/dev/null || echo "MISSING I2PChat-windows"
          cp I2PChat-macos/I2PChat release-assets/I2PChat-macos 2>/dev/null || echo "MISSING I2PChat-macos"
          ls I2PChat-linux/I2PChat-*.AppImage 2>/dev/null && \
            cp I2PChat-linux/I2PChat-*.AppImage release-assets/ || echo "No AppImage"

      - name: Upload continuous release
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: Continuous Build
          body: "Automated build from the latest master commit."
          artifacts: release-assets/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          omitBodyDuringUpdate: true
          skipIfReleaseExists: false
          token: ${{ secrets.GITHUB_TOKEN }}
