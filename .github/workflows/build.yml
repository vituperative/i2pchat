name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qt5-qmake qtbase5-dev qtmultimedia5-dev libqt5svg5-dev

      - name: Install build tools
        run: |
          sudo apt-get install -y g++ make bear clang-format clang-tidy pipx
          pipx install compiledb

      - name: Build
        run: bash build.sh

      - name: Check formatting
        run: bash build.sh --format

      - name: Static analysis
        run: bash build.sh --tidy

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-linux
          path: dist/I2PChat
