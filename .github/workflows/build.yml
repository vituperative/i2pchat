name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qt5-qmake qtbase5-dev qtmultimedia5-dev libqt5svg5-dev

      - name: Install build tools
        run: |
          sudo apt-get install -y g++ make upx

      - name: Build
        run: bash build.sh --appimage $( [[ '${{ github.ref }}' == refs/tags/v* ]] && echo --upx )

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-linux
          path: |
            dist/I2PChat
            dist/I2PChat-*.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-make
            mingw-w64-x86_64-upx

      - name: Build
        shell: msys2 {0}
        run: |
          qmake I2PChat.pro "CONFIG += release"
          mingw32-make -j$(nproc)

      - name: Strip
        shell: msys2 {0}
        run: strip dist/I2PChat.exe

      - name: Compress with UPX
        if: startsWith(github.ref, 'refs/tags/v')
        shell: msys2 {0}
        run: upx --best dist/I2PChat.exe

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-windows
          path: dist/I2PChat.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          cp I2PChat-linux/I2PChat release-assets/
          cp I2PChat-windows/I2PChat.exe release-assets/
          ls I2PChat-linux/I2PChat-*.AppImage 2>/dev/null && \
            cp I2PChat-linux/I2PChat-*.AppImage release-assets/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
