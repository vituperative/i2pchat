name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qt6-base-dev qt6-multimedia-dev libqt6svg6-dev
          # Ubuntu provides qmake6 — symlink so build.sh finds qmake
          if ! command -v qmake &>/dev/null && command -v qmake6 &>/dev/null; then
            sudo ln -sf "$(command -v qmake6)" /usr/local/bin/qmake
          fi

      - name: Install build tools
        run: |
          sudo apt-get install -y g++ make bear clang-format clang-tidy pipx upx
          pipx install compiledb

      - name: Build
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then

            bash build.sh --upx
          else
            bash build.sh
          fi

      - name: Check formatting
        run: bash build.sh --format

      - name: Static analysis
        run: bash build.sh --tidy

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-linux
          path: dist/I2PChat

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/I2PChat
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-make
            git

      - name: Build
        run: |
          mkdir -p dist
          qmake I2PChat.pro "CONFIG += release" DESTDIR=dist
          mingw32-make -j$(nproc)

      - name: Upload binary (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-windows
          path: dist/I2PChat.exe

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/I2PChat.exe
          name: I2PChat ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}

  build-macos:
    runs-on: macos-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          brew update > /dev/null
          brew install qt@6
          echo "$(brew --prefix qt@6)/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir -p dist
          qmake I2PChat.pro "CONFIG += release" DESTDIR=dist
          make -j$(sysctl -n hw.logicalcpu)

      - name: Bundle .app
        run: macdeployqt dist/I2PChat.app -verbose=2

      - name: Upload binary (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-macos
          path: dist/I2PChat.app

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/I2PChat.app
          name: I2PChat ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
