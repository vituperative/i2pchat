name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qt5-qmake qtbase5-dev qtmultimedia5-dev libqt5svg5-dev

      - name: Install build tools
        run: |
          sudo apt-get install -y g++ make upx

      - name: Build
        run: bash build.sh --appimage $( [[ '${{ github.ref }}' == refs/tags/v* ]] && echo --upx )

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-linux
          path: |
            dist/I2PChat
            dist/I2PChat-*.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          mkdir dist
          qmake I2PChat.pro "CONFIG += release" -after DESTDIR=dist/
          nmake

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-windows
          path: dist/I2PChat.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: mac
          target: desktop
          arch: clang_64

      - name: Build
        run: |
          qmake I2PChat.pro "CONFIG += release" -after DESTDIR=dist/
          make -j$(sysctl -n hw.logicalcpu)
          strip dist/I2PChat.app/Contents/MacOS/I2PChat -o dist/I2PChat 2>/dev/null || \
            cp dist/I2PChat.app/Contents/MacOS/I2PChat dist/I2PChat

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: I2PChat-macos
          path: dist/I2PChat

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir -p release-assets
          cp I2PChat-linux/I2PChat release-assets/
          cp I2PChat-windows/I2PChat.exe release-assets/
          cp I2PChat-macos/I2PChat release-assets/I2PChat-macos
          ls I2PChat-linux/I2PChat-*.AppImage 2>/dev/null && \
            cp I2PChat-linux/I2PChat-*.AppImage release-assets/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
